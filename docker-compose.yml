# Pipeline ETL trafic aérien — `docker compose up` :
#   - `dashboard` : Streamlit sur http://localhost:8501 (toujours up)
#   - `etl`       : exécute un batch complet (Bronze -> Silver -> Gold) puis sort
# Les deux partagent le volume nommé `datalake` -> le dashboard suit le run en direct
# (onglet « Statut d'exécution »). Aucun fichier .env requis : voir .env.example pour surcharger.

services:
  etl:
    build: .
    image: flight-etl:latest
    command: ["python", "scripts/run_job.py", "--with-silver-gold"]
    environment:
      FR24_EMAIL: ${FR24_EMAIL:-}
      FR24_PASSWORD: ${FR24_PASSWORD:-}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
      # Jeu OpenFlights persisté dans le volume (téléchargé une fois, rafraîchi à 14 j).
      DIM_AIRPORTS_STATIC_PATH: /app/datalake/_reference/airports.dat
    volumes:
      - datalake:/app/datalake
    restart: "no"

  dashboard:
    # Réutilise l'image construite par `etl` (évite une double build concurrente du même tag).
    image: flight-etl:latest
    command:
      - streamlit
      - run
      - dashboard.py
      - --server.address=0.0.0.0
      - --server.headless=true
      - --server.port=8501
    environment:
      DIM_AIRPORTS_STATIC_PATH: /app/datalake/_reference/airports.dat
    ports:
      - "8501:8501"
    volumes:
      - datalake:/app/datalake
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Orchestration (profil "airflow") — n'affecte pas `docker compose up`.
  # Backend Postgres (pas de verrou SQLite) + LocalExecutor : déploiement minimal mais fiable.

  postgres:
    image: postgres:16-alpine
    profiles: ["airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Proxy filtrant devant le socket Docker (tecnativa/docker-socket-proxy, basé HAProxy).
  # Airflow ne monte PLUS le socket brut : il parle au proxy en TCP sur le réseau interne du
  # compose (aucun port publié). Le socket n'est exposé qu'ici, en lecture seule, dans un
  # conteneur minimal sans capabilities -> on neutralise la faille classique du docker.sock
  # (Airflow exécute du code DAG arbitraire et n'a plus besoin d'être root ni d'accéder au socket).
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    profiles: ["airflow"]
    environment:
      CONTAINERS: 1        # créer / inspecter / supprimer le conteneur du job
      IMAGES: 1            # inspecter l'image flight-etl
      POST: 1              # autoriser create/start/remove (sinon API en lecture seule)
      # tout le reste reste à 0 (EXEC, NETWORKS, VOLUMES, INFO, AUTH, SWARM, etc.)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    # PAS de `ports:` -> joignable uniquement via le réseau interne du compose.

  # Airflow standalone (webserver + scheduler) ; il DÉCLENCHE le job dans un conteneur
  # `flight-etl` séparé (DockerOperator) -> via le proxy, sans monter le socket ni être root.
  airflow:
    build: ./airflow
    image: flight-airflow:latest
    profiles: ["airflow"]
    # Identifiants déterministes admin/admin : on crée l'utilisateur AVANT `standalone`
    # (qui ne retouche pas un admin existant) -> pas de mot de passe aléatoire à chercher.
    command:
      - bash
      - -c
      - |
        airflow db migrate
        airflow users create --role Admin --username admin --password admin --firstname Admin --lastname User --email admin@example.com || true
        airflow users reset-password --username admin --password admin
        exec airflow standalone
    depends_on:
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      FR24_EMAIL: ${FR24_EMAIL:-}
      FR24_PASSWORD: ${FR24_PASSWORD:-}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - datalake:/opt/airflow/datalake   # volume "flight_datalake" — lecture des métriques (check_outcome)

volumes:
  datalake:
    name: flight_datalake   # nom stable : référencé par le DockerOperator et le service airflow
  pgdata:                   # métadonnées Airflow (Postgres)
