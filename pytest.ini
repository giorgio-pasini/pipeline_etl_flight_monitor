[pytest]
# Configuration pytest pour le projet

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end (deselect with '-m "not e2e"')

# Logging
log_cli = false
log_level = INFO

# Output
addopts = -v --tb=short
